<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Tickets</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1>Login de acceso</h1>

    <section class="card login-card">
      <p>Ingrese sus credenciales para acceder a las acciones protegidas.</p>

      <form id="formLogin">
        <div class="grupo">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" name="usuario" required>
        </div>

        <div class="grupo">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required>
        </div>

        <div class="barra-superior">
          <button type="submit">Ingresar</button>
          <button type="button" id="btnVolver" class="btn-secundario">Volver al listado</button>
        </div>
      </form>

      <div class="demo-box">
        <strong>Credenciales demo:</strong><br>
        Usuario: admin<br>
        Contraseña: 1234
      </div>

      <div id="mensaje"></div>
    </section>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
